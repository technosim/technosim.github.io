<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2d3d"/>
    </linearGradient>
    <linearGradient id="beakerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e3a4a" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="66" x2="200" y2="66"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="134" x2="200" y2="134"/>
    <line x1="66" y1="0" x2="66" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="134" y1="0" x2="134" y2="200"/>
  </g>

  <!-- ── NETWORK SWITCH (top area) ── -->
  <!-- Switch body -->
  <rect x="48" y="52" width="104" height="32" rx="5" ry="5" fill="#0d2233" stroke="#00d4ff" stroke-width="1.2"/>

  <!-- Port holes -->
  <rect x="56" y="61" width="8" height="5" rx="1" fill="#00d4ff" opacity="0.7"/>
  <rect x="69" y="61" width="8" height="5" rx="1" fill="#00d4ff" opacity="0.7"/>
  <rect x="82" y="61" width="8" height="5" rx="1" fill="#00d4ff" opacity="0.3"/>
  <rect x="95" y="61" width="8" height="5" rx="1" fill="#00d4ff" opacity="0.7"/>
  <rect x="108" y="61" width="8" height="5" rx="1" fill="#00d4ff" opacity="0.3"/>
  <rect x="121" y="61" width="8" height="5" rx="1" fill="#00d4ff" opacity="0.7"/>

  <!-- Status LEDs -->
  <circle cx="58" cy="74" r="2" fill="#00ff88" opacity="0.9" filter="url(#glow)"/>
  <circle cx="71" cy="74" r="2" fill="#00ff88" opacity="0.9" filter="url(#glow)"/>
  <circle cx="84" cy="74" r="2" fill="#ff6b35" opacity="0.9"/>
  <circle cx="97" cy="74" r="2" fill="#00ff88" opacity="0.9" filter="url(#glow)"/>
  <circle cx="110" cy="74" r="2" fill="#00ff88" opacity="0.5"/>
  <circle cx="123" cy="74" r="2" fill="#00ff88" opacity="0.9" filter="url(#glow)"/>

  <!-- ── BEAKER (bottom area) ── -->
  <!-- Beaker body -->
  <path d="M82 100 L74 148 Q73 152 77 152 L123 152 Q127 152 126 148 L118 100 Z"
        fill="url(#beakerGrad)" stroke="#00d4ff" stroke-width="1.2"/>
  <!-- Beaker neck -->
  <rect x="82" y="92" width="36" height="10" rx="2" fill="#0d2233" stroke="#00d4ff" stroke-width="1.2"/>
  <!-- Beaker spout -->
  <path d="M100 92 L104 86 L108 86" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Liquid level -->
  <path d="M76 138 Q100 133 124 138 L126 148 Q127 152 123 152 L77 152 Q73 152 74 148 Z"
        fill="#00d4ff" opacity="0.25"/>
  <!-- Liquid surface shimmer -->
  <path d="M78 138 Q100 133 122 138" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>

  <!-- Bubbles in beaker -->
  <circle cx="88" cy="144" r="2.5" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
  <circle cx="98" cy="140" r="1.8" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
  <circle cx="110" cy="145" r="2" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>

  <!-- ── CONNECTION LINE between switch and beaker ── -->
  <line x1="100" y1="84" x2="100" y2="92" stroke="#00d4ff" stroke-width="1" opacity="0.5" stroke-dasharray="2,2"/>

  <!-- Border ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
</svg>